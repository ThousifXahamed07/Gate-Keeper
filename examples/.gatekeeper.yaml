# Example Gatekeeper Schema
# This file demonstrates all supported validation features

version: "1"

groups:
  - name: Application
    description: Core application configuration

  - name: Server
    description: HTTP server settings

  - name: Database
    description: Database connection settings

  - name: Services
    description: External service configuration

  - name: Storage
    description: File storage configuration

  - name: Features
    description: Feature flags and limits

vars:
  # Application settings
  - name: APP_NAME
    type: string
    required: true
    description: Application name
    group: Application

  - name: APP_ENV
    type: enum
    required: true
    allowed_values: ["development", "staging", "production"]
    description: Application environment
    group: Application

  - name: DEBUG
    type: boolean
    required: false
    default: "false"
    description: Enable debug mode
    group: Application

  # Server configuration
  - name: PORT
    type: port
    required: true
    description: Server port number
    group: Server

  - name: HOST
    type: string
    required: false
    default: "0.0.0.0"
    description: Server host address
    group: Server

  - name: READ_TIMEOUT
    type: duration
    required: false
    default: "30s"
    description: HTTP read timeout
    group: Server

  # Database configuration
  - name: DATABASE_URL
    type: url
    required: true
    sensitive: true
    description: Database connection URL
    group: Database

  - name: DB_MAX_CONNECTIONS
    type: integer
    required: false
    default: "10"
    description: Maximum database connections
    group: Database

  - name: DB_TIMEOUT
    type: duration
    required: false
    default: "5s"
    description: Database query timeout
    group: Database

  # External services
  - name: API_KEY
    type: string
    required: true
    sensitive: true
    pattern: "^[A-Za-z0-9]{32,64}$"
    description: API key for external service
    group: Services

  - name: WEBHOOK_URL
    type: url
    required: false
    description: Webhook endpoint URL
    group: Services

  - name: ADMIN_EMAIL
    type: email
    required: true
    description: Administrator email address
    group: Services

  # File paths
  - name: LOG_DIR
    type: filepath
    required: false
    default: "/var/log/app"
    description: Log directory path
    group: Storage

  - name: UPLOAD_DIR
    type: filepath
    required: true
    description: File upload directory
    group: Storage

  # Feature flags
  - name: MAX_UPLOAD_SIZE
    type: float
    required: false
    default: "10.5"
    description: Maximum upload size in MB
    group: Features

  - name: RATE_LIMIT
    type: integer
    required: false
    default: "100"
    description: API rate limit per minute
    group: Features
